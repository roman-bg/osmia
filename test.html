<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Ден градуси (MQTT)</title>
    <!-- MQTT.js -->
    <script src="https://unpkg.com/mqtt@5.0.0/dist/mqtt.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #0b1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #ffffff;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            padding: 30px 20px;
            text-align: center;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 300;
            color: #1e3a5f;
            margin-bottom: 20px;
        }
        .status-bar {
            background: #eef2f6;
            border-radius: 50px;
            padding: 12px 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 1rem;
        }
        .connection-status {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .led {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #95a5a6;
            transition: background 0.25s, box-shadow 0.25s;
        }
        .led.connected {
            background: #2ecc71;
            box-shadow: 0 0 14px #2ecc71;
        }
        .led.disconnected {
            background: #e74c3c;
        }
        .temperature-display {
            font-size: 7rem;
            font-weight: 700;
            color: #1e3a5f;
            line-height: 1.2;
            margin: 20px 0 10px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .unit {
            font-size: 1.8rem;
            font-weight: 300;
            color: #5f7d9c;
            margin-top: 5px;
        }
        .error-message {
            color: #a82323;
            font-weight: 500;
            background: #ffe5e5;
            padding: 12px 16px;
            border-radius: 40px;
            margin: 20px 0 10px;
            text-align: center;
            font-size: 0.9rem;
            border: 1px solid #ffb3b3;
        }
        .debug {
            font-size: 0.65rem;
            color: #5f7d9c;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌡️ Ден градуси</h1>

        <div class="status-bar">
            <div class="connection-status">
                <span class="led" id="ledIndicator"></span>
                <span id="connectionState">Изключен</span>
            </div>
            <div id="lastUpdate" style="color:#2c5778;">--:--:--</div>
        </div>

        <div id="errorContainer" style="display: none;" class="error-message"></div>

        <div class="temperature-display" id="temperatureValue">---</div>
        <div class="unit">Ден градуси</div>

        <div id="debug" class="debug"></div>
    </div>

    <script>
        (function() {
            // --- Конфигурация на брокера (скрита) ---
            const BROKER = {
                host: 'broker.emqx.io',
                port: 8084,
                path: '/mqtt',
                topic: 'romanbg/dd',
               // username: 'chosyz9864',
               // password: '390aclmprv'
            };

            let client = null;

            const led = document.getElementById('ledIndicator');
            const connState = document.getElementById('connectionState');
            const lastUpdateSpan = document.getElementById('lastUpdate');
            const temperatureSpan = document.getElementById('temperatureValue');
            const errorDiv = document.getElementById('errorContainer');
            const debugDiv = document.getElementById('debug');

            function logDebug(msg) {
                console.log(msg);
                debugDiv.textContent = msg;
            }

            function showError(msg) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = msg;
                console.error(msg);
            }

            function hideError() {
                errorDiv.style.display = 'none';
            }

            function setConnected(connected) {
                if (connected) {
                    led.className = 'led connected';
                    connState.textContent = 'Свързан';
                    hideError();
                } else {
                    led.className = 'led disconnected';
                    connState.textContent = 'Изключен';
                }
            }

            function parseTemperature(payload) {
                if (typeof payload === 'string') {
                    try {
                        const json = JSON.parse(payload);
                        if (json.temperature !== undefined) return parseFloat(json.temperature);
                        if (json.value !== undefined) return parseFloat(json.value);
                        if (json.temp !== undefined) return parseFloat(json.temp);
                    } catch (e) { /* не е JSON */ }
                    const num = parseFloat(payload);
                    return isNaN(num) ? null : num;
                }
                return null;
            }

            function connect() {
                if (typeof mqtt === 'undefined') {
                    showError('MQTT библиотеката не се зареди. Опреснете страницата.');
                    return;
                }

                const brokerUrl = `wss://${BROKER.host}:${BROKER.port}${BROKER.path}`;
                logDebug(`Свързване към ${brokerUrl}`);

                const options = {
                    clientId: 'web_' + Math.random().toString(36).substring(2, 12),
                   /// username: BROKER.username,
                  ///  password: BROKER.password,
                    clean: true,
                    reconnectPeriod: 5000,
                    connectTimeout: 15 * 1000,
                };

                try {
                    client = mqtt.connect(brokerUrl, options);
                } catch (e) {
                    showError('Грешка при създаване на клиент: ' + e.message);
                    return;
                }

                client.on('connect', () => {
                    logDebug('Успешно свързване');
                    setConnected(true);
                    client.subscribe(BROKER.topic, (err) => {
                        if (err) showError('Грешка при абониране: ' + err);
                    });
                });

                client.on('message', (topic, message) => {
                    const payload = message.toString();
                    const temp = parseTemperature(payload);
                    if (temp !== null) {
                        const now = new Date();
                        const timeStr = now.toLocaleTimeString('bg-BG', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                        temperatureSpan.textContent = temp.toFixed(1);
                        lastUpdateSpan.textContent = timeStr;
                    }
                });

                client.on('error', (err) => {
                    console.error('MQTT грешка:', err);
                    setConnected(false);
                    showError('Грешка: ' + err.message);
                });

                client.on('close', () => {
                    setConnected(false);
                });
            }

            window.addEventListener('load', () => {
                setTimeout(connect, 500);
            });

            window.addEventListener('beforeunload', () => {
                if (client && client.connected) {
                    client.end(true);
                }
            });
        })();
    </script>
</body>
</html>
