<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Температура (MQTT)</title>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- MQTT.js -->
    <script src="https://unpkg.com/mqtt@5.0.0/dist/mqtt.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 12px;
        }
        .container {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            padding: 20px 16px;
        }
        h1 {
            font-size: 1.9rem;
            font-weight: 300;
            color: #2c3e50;
            text-align: center;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }
        .status-bar {
            background: #ecf0f1;
            border-radius: 60px;
            padding: 12px 20px;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 1rem;
        }
        .connection-status {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .led {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #95a5a6;
            transition: background 0.25s, box-shadow 0.25s;
        }
        .led.connected {
            background: #2ecc71;
            box-shadow: 0 0 12px #2ecc71;
        }
        .led.disconnected {
            background: #e74c3c;
        }
        .last-message {
            background: #2c3e50;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
            font-size: 1.4rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .chart-container {
            position: relative;
            height: 280px;
            margin: 8px 0 5px;
            border: 1px solid #e0e7e9;
            border-radius: 28px;
            padding: 6px;
            background: white;
            touch-action: pan-y;
        }
        .info-note {
            text-align: center;
            font-size: 0.7rem;
            color: #95a5a6;
            margin-top: 16px;
            border-top: 1px solid #ecf0f1;
            padding-top: 14px;
        }
        .error-message {
            color: #e74c3c;
            font-weight: 500;
            background: #fadbd8;
            padding: 8px 12px;
            border-radius: 40px;
            margin-bottom: 10px;
            text-align: center;
            font-size: 0.85rem;
        }
        .info-note code {
            background: #ecf0f1;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 0.7rem;
        }
        .debug-info {
            font-size: 0.65rem;
            color: #7f8c8d;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌡️ MQTT термометър</h1>

        <div class="status-bar">
            <div class="connection-status">
                <span class="led" id="ledIndicator"></span>
                <span id="connectionState">Изключен</span>
            </div>
            <div>
                <span style="color:#5d6d7e;">посл.</span>
                <span id="lastValue" class="last-message">---</span>
            </div>
        </div>

        <div id="errorContainer" style="display: none;" class="error-message"></div>

        <div class="chart-container">
            <canvas id="temperatureChart"></canvas>
        </div>

        <div class="info-note">
            ⚡ автоматично свързване с <code>b37.mqtt.one:8083/mqtt</code> (topic <code>chosyz9864/dd</code>)<br>
            <span style="color:#e67e22;">🔄 при грешка опитва с wss:// (порт 8084)</span>
        </div>
        <div id="debug" class="debug-info"></div>
    </div>

    <script>
        (function() {
            // ---- конфигурация ----
            const CONFIG = {
                host: 'b37.mqtt.one',
                wsPort: 8083,
                wssPort: 8084,        // стандартен wss порт за HiveMQ
                path: '/mqtt',         // брокерът очаква /mqtt
                topic: 'chosyz9864/dd',
                username: 'chosyz9864',
                password: '390aclmprv'
            };

            let client = null;
            let chart = null;
            let reconnectTimer = null;
            let connectionAttempts = 0;
            const maxDataPoints = 25;
            let chartData = [];
            let chartLabels = [];

            const led = document.getElementById('ledIndicator');
            const connState = document.getElementById('connectionState');
            const lastValueSpan = document.getElementById('lastValue');
            const errorDiv = document.getElementById('errorContainer');
            const debugDiv = document.getElementById('debug');

            function logDebug(msg) {
                console.log(msg);
                debugDiv.textContent = msg;
            }

            function showError(msg) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = msg;
                console.error(msg);
            }

            function hideError() {
                errorDiv.style.display = 'none';
            }

            function initChart() {
                const ctx = document.getElementById('temperatureChart').getContext('2d');
                chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: chartLabels,
                        datasets: [{
                            label: 'температура °C',
                            data: chartData,
                            borderColor: '#e67e22',
                            backgroundColor: 'rgba(230,126,34,0.08)',
                            borderWidth: 3,
                            pointRadius: 2.5,
                            pointHoverRadius: 6,
                            tension: 0.2,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { ticks: { font: { size: 9 } }, grid: { display: false } },
                            y: { ticks: { font: { size: 9 } }, grid: { color: '#e9ecef' } }
                        }
                    }
                });
            }

            function updateChart(value, timeLabel) {
                chartLabels.push(timeLabel);
                chartData.push(value);
                if (chartData.length > maxDataPoints) {
                    chartData.shift();
                    chartLabels.shift();
                }
                chart.update();
            }

            function parseTemperature(payload) {
                if (typeof payload === 'string') {
                    try {
                        const json = JSON.parse(payload);
                        if (json.temperature !== undefined) return parseFloat(json.temperature);
                        if (json.value !== undefined) return parseFloat(json.value);
                        if (json.temp !== undefined) return parseFloat(json.temp);
                    } catch (e) { /* не е JSON */ }
                    const num = parseFloat(payload);
                    return isNaN(num) ? null : num;
                }
                return null;
            }

            function setConnected(connected) {
                if (connected) {
                    led.className = 'led connected';
                    connState.textContent = 'Свързан';
                    hideError();
                } else {
                    led.className = 'led disconnected';
                    connState.textBody = 'Изключен';
                }
            }

            function disconnectClient() {
                if (client) {
                    client.end(true);
                    client = null;
                }
            }

            // ---- опит за свързване с даден протокол ----
            function connectWithProtocol(useSSL) {
                const protocol = useSSL ? 'wss' : 'ws';
                const port = useSSL ? CONFIG.wssPort : CONFIG.wsPort;
                // НЯКОИ БРОКЕРИ ИЗИСКВАТ path ДА Е ЧАСТ ОТ URL
                const brokerUrl = `${protocol}://${CONFIG.host}:${port}${CONFIG.path}`;
                logDebug(`Опит с ${brokerUrl}`);

                const options = {
                    clientId: 'web_' + Math.random().toString(36).substring(2, 12),
                    username: CONFIG.username,
                    password: CONFIG.password,
                    clean: true,
                    reconnectPeriod: -1,          // забраняваме автоматично пресвързване, за да контролираме ние
                    connectTimeout: 10 * 1000,
                };

                try {
                    client = mqtt.connect(brokerUrl, options);
                } catch (e) {
                    showError(`Грешка при създаване на клиент: ${e.message}`);
                    return false;
                }

                let connected = false;
                let timeout = setTimeout(() => {
                    if (!connected) {
                        logDebug('Таймаут на свързването');
                        client.end(true);
                        client = null;
                        // ако сме опитвали с ws, пробваме с wss
                        if (!useSSL) {
                            logDebug('Опит с wss...');
                            connectWithProtocol(true);
                        } else {
                            showError('Неуспешно свързване и с двата протокола. Проверете дали брокерът е достъпен.');
                            setConnected(false);
                        }
                    }
                }, 12000);

                client.on('connect', () => {
                    clearTimeout(timeout);
                    connected = true;
                    logDebug('Свързан успешно');
                    setConnected(true);
                    client.subscribe(CONFIG.topic, (err) => {
                        if (err) showError('Грешка при абониране: ' + err);
                    });
                });

                client.on('message', (topic, message) => {
                    const payload = message.toString();
                    const temp = parseTemperature(payload);
                    if (temp !== null) {
                        const now = new Date();
                        const timeLabel = now.toLocaleTimeString('bg-BG', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                        lastValueSpan.textContent = temp.toFixed(1) + ' °C';
                        updateChart(temp, timeLabel);
                    }
                });

                client.on('error', (err) => {
                    console.error('MQTT грешка:', err);
                    // Ако получим грешка за сигурност или други, и още не сме опитвали wss
                    if (!useSSL && err.message && (err.message.includes('SSL') || err.message.includes('secure') || err.message.includes('insecure'))) {
                        clearTimeout(timeout);
                        logDebug('SSL грешка, пробвам с wss...');
                        client.end(true);
                        client = null;
                        connectWithProtocol(true);
                    } else {
                        showError('Грешка: ' + err.message);
                        setConnected(false);
                    }
                });

                client.on('close', () => {
                    setConnected(false);
                });

                return true;
            }

            // ---- стартиране на свързване (първо с ws) ----
            function startConnection() {
                if (typeof mqtt === 'undefined') {
                    showError('MQTT библиотеката не се зареди. Опреснете страницата.');
                    return;
                }
                connectWithProtocol(false); // започваме с ws
            }

            window.addEventListener('load', () => {
                initChart();
                setTimeout(startConnection, 500);
            });

            window.addEventListener('beforeunload', () => {
                if (client && client.connected) {
                    client.end(true);
                }
            });
        })();
    </script>
</body>
</html>
